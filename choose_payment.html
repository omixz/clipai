<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Choose payment method — Peakcut</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%237048e8'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle'%3E%F0%9F%8E%AC%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --ink: #16141f; --paper: #f6f5fb; --card: #ffffff; --accent: #7048e8;
    --accent-dark: #5a35c9; --muted: #6b6478; --border: #e3e0f0; --radius: 14px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--paper); color: var(--ink); line-height: 1.6; }
  .wrap { max-width: 460px; margin: 0 auto; padding: 0 20px; }
  header { text-align: center; padding: 40px 0 24px; }
  .brand { font-size: 1rem; font-weight: 800; margin-bottom: 4px; }
  h1 { font-size: 1.5rem; margin: 8px 0; }
  header p { color: var(--muted); margin: 0; }

  .option { display: flex; flex-direction: column; gap: 4px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 14px; text-decoration: none; color: var(--ink); transition: border-color 0.15s; }
  .option:hover { border-color: var(--accent); }
  .option strong { font-size: 1.05rem; }
  .option span { color: var(--muted); font-size: 0.88rem; }

  a.back { display: block; text-align: center; color: var(--muted); font-size: 0.9rem; margin-top: 20px; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">🎬 Peakcut</div>
      <h1>How do you want to pay for __TIER_LABEL__?</h1>
      <p>__PRICE__ / month</p>
    </header>

    __OPTIONS__

    <a class="back" href="__SITE_URL__/">Cancel</a>
  </div>
</body>
</html>
